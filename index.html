<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickSplit</title>

  <style>
    :root {
      --primary: #2563eb; /* Cool blue */
      --primary-soft: #dbeafe;
      --accent: #f59e0b; /* Warm amber */
      --bg: #f8fafc; /* Soft light gray-blue */
      --card: #ffffff;
      --text: #1e293b; /* Dark slate */
      --muted: #64748b; /* Muted blue-gray */
      --danger: #dc2626; /* Red */
      --success: #059669; /* Green */
      --shadow: 0 12px 30px rgba(37,99,235,.08); /* Subtle blue shadow */
    }

    * {
      box-sizing: border-box;
      font-family: "Poppins", system-ui, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      padding: 24px;
      color: var(--text);
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      margin: 0;
      color: var(--primary);
      letter-spacing: .2px;
    }

    header p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 18px;
      flex-wrap: wrap;
    }

    nav button {
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      background: #e5e7eb;
      color: #111;
      cursor: pointer;
      font-weight: 600;
      transition: transform .12s ease, box-shadow .12s ease;
    }

    nav button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0,0,0,.08);
    }

    nav button.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 22px rgba(15,81,50,.25);
    }

    .section {
      background: var(--card);
      padding: 22px;
      border-radius: 18px;
      max-width: 980px;
      margin: auto;
      box-shadow: var(--shadow);
    }

    h2 {
      margin-top: 0;
      color: var(--primary);
    }

    .subhead {
      color: var(--muted);
      margin-top: -8px;
      margin-bottom: 14px;
      font-size: 13px;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 11px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      flex: 1;
      min-width: 180px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(15,81,50,.55);
      box-shadow: 0 0 0 4px rgba(15,81,50,.12);
    }

    button {
      padding: 11px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,.08);
    }

    button:active {
      transform: translateY(0px);
      box-shadow: none;
    }

    button.primary {
      background: var(--primary);
      color: white;
    }

    button.secondary {
      background: var(--accent);
      color: #111;
    }

    button.ghost {
      background: transparent;
      color: var(--primary);
      border: 1px dashed var(--primary);
      box-shadow: none;
    }

    button.danger {
      background: #fee2e2;
      color: var(--danger);
    }

    button.small {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 800;
    }

    button.disabled, button:disabled {
      opacity: .55;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 6px 10px;
      border-radius: 999px;
      margin: 6px 6px 0 0;
      font-size: 13px;
      font-weight: 700;
    }

    .pill .x {
      border: none;
      background: rgba(15,81,50,.12);
      color: var(--primary);
      border-radius: 999px;
      padding: 4px 8px;
      cursor: pointer;
      font-weight: 900;
      box-shadow: none;
      transform: none;
    }

    .pill .x:hover {
      background: rgba(15,81,50,.18);
    }

    .cost {
      border: 1px dashed #cbd5e1;
      padding: 16px;
      border-radius: 16px;
      margin-top: 18px;
    }

    .cost strong {
      display: block;
      margin-bottom: 6px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 12px 0;
    }

    .summary-line {
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
    }

    .positive {
      color: var(--success);
      font-weight: 800;
    }

    .negative {
      color: var(--danger);
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .badge.warn {
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
    }

    .badge.ok {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .card {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 820px) {
      .grid2 {
        grid-template-columns: 1fr;
      }
    }

    footer {
      text-align: center;
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- React 18 + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- jsPDF for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const STORAGE_KEY = "quicksplit_premium_v1";

    function App() {
      // ---------------- Load / Save ----------------
      const [activeTab, setActiveTab] = useState("members");

      const [members, setMembers] = useState([]);
      const [memberName, setMemberName] = useState("");
      const [costs, setCosts] = useState([]);

      const [currency, setCurrency] = useState("BDT");

      // computed screens
      const [summaryData, setSummaryData] = useState(null);
      const [simplifyTx, setSimplifyTx] = useState([]);

      // load
      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;

          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === "object") {
            setMembers(Array.isArray(parsed.members) ? parsed.members : []);
            setCosts(Array.isArray(parsed.costs) ? parsed.costs : []);
            setCurrency(parsed.currency || "BDT");
          }
        } catch (e) {}
      }, []);

      // autosave
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ members, costs, currency }));
        } catch (e) {}
      }, [members, costs, currency]);

      // ---------------- Helpers ----------------
      const safeNumber = (n) => {
        const x = Number(n);
        return Number.isFinite(x) ? x : 0;
      };

      const round2 = (n) => Math.round((n + Number.EPSILON) * 100) / 100;

      const computeBalances = () => {
        const data = {};
        members.forEach((m) => data[m] = { paid: 0, consumed: 0 });
        costs.forEach((c) => {
          const status = costStatus(c);
          if (!status.ok) return;
          const total = c.payers.reduce((s, p) => s + safeNumber(p.amount), 0);
          c.payers.forEach((p) => data[p.name].paid += safeNumber(p.amount));
          const share = total / c.sharedBy.length;
          c.sharedBy.forEach((m) => data[m].consumed += share);
        });
        return members.map((m) => ({
          name: m,
          net: round2(data[m].paid - data[m].consumed)
        }));
      };

      const resetApp = () => {
        if (!confirm("Reset everything? This will clear all members and costs.")) return;
        setMembers([]);
        setCosts([]);
        setMemberName("");
        setSummaryData(null);
        setSimplifyTx([]);
        setActiveTab("members");
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      };

      // ---------------- Members ----------------
      const addMember = () => {
        const name = memberName.trim();
        if (!name) return;
        if (members.includes(name)) return;
        setMembers((prev) => [...prev, name]);
        setMemberName("");
      };

      const removeMember = (name) => {
        if (!confirm(`Remove "${name}"? This will update payers & shared lists too.`)) return;

        setMembers((prev) => prev.filter((m) => m !== name));

        // Clean in costs
        setCosts((prev) =>
          prev.map((c) => ({
            ...c,
            payers: c.payers.filter((p) => p.name !== name),
            sharedBy: c.sharedBy.filter((m) => m !== name),
          }))
        );
      };

      // ---------------- Costs ----------------
      const addCost = () => {
        setCosts((prev) => [
          ...prev,
          { title: "", payers: [], sharedBy: [] }
        ]);
      };

      const removeCost = (costIndex) => {
        if (!confirm(`Delete this cost?`)) return;
        setCosts((prev) => prev.filter((_, i) => i !== costIndex));
      };

      const updateCostTitle = (costIndex, value) => {
        setCosts((prev) =>
          prev.map((c, i) => (i === costIndex ? { ...c, title: value } : c))
        );
      };

      const addPayer = (costIndex) => {
        if (!members.length) return;

        setCosts((prev) =>
          prev.map((c, i) => {
            if (i !== costIndex) return c;
            return {
              ...c,
              payers: [...c.payers, { name: members[0], amount: 0 }]
            };
          })
        );
      };

      const removePayer = (costIndex, payerIndex) => {
        setCosts((prev) =>
          prev.map((c, i) => {
            if (i !== costIndex) return c;
            return {
              ...c,
              payers: c.payers.filter((_, j) => j !== payerIndex)
            };
          })
        );
      };

      const updatePayerName = (costIndex, payerIndex, value) => {
        setCosts((prev) =>
          prev.map((c, i) => {
            if (i !== costIndex) return c;
            return {
              ...c,
              payers: c.payers.map((p, j) => (j === payerIndex ? { ...p, name: value } : p))
            };
          })
        );
      };

      const updatePayerAmount = (costIndex, payerIndex, value) => {
        const amount = safeNumber(value);
        setCosts((prev) =>
          prev.map((c, i) => {
            if (i !== costIndex) return c;
            return {
              ...c,
              payers: c.payers.map((p, j) => (j === payerIndex ? { ...p, amount } : p))
            };
          })
        );
      };

      const toggleShare = (costIndex, name, checked) => {
        setCosts((prev) =>
          prev.map((c, i) => {
            if (i !== costIndex) return c;

            if (checked) {
              if (c.sharedBy.includes(name)) return c;
              return { ...c, sharedBy: [...c.sharedBy, name] };
            } else {
              return { ...c, sharedBy: c.sharedBy.filter((n) => n !== name) };
            }
          })
        );
      };

      const shareAll = (costIndex) => {
        setCosts((prev) =>
          prev.map((c, i) => {
            if (i !== costIndex) return c;
            return { ...c, sharedBy: [...members] };
          })
        );
      };

      const shareNone = (costIndex) => {
        setCosts((prev) =>
          prev.map((c, i) => {
            if (i !== costIndex) return c;
            return { ...c, sharedBy: [] };
          })
        );
      };

      // ---------------- Validation ----------------
      const costStatus = (c) => {
        const hasTitle = (c.title || "").trim().length > 0;
        const hasPayers = c.payers.length > 0 && c.payers.some(p => safeNumber(p.amount) > 0);
        const hasShared = c.sharedBy.length > 0;

        if (!hasPayers || !hasShared) return { ok: false, label: "Incomplete", type: "warn" };
        if (!hasTitle) return { ok: true, label: "Ready (no title)", type: "ok" };
        return { ok: true, label: "Ready", type: "ok" };
      };

      // ---------------- Summary ----------------
      const calculateSummary = () => {
        if (!members.length) {
          setSummaryData({ error: "Add members first." });
          setActiveTab("summary");
          return;
        }

        const data = {};
        members.forEach((m) => {
          data[m] = { paid: 0, consumed: 0, breakdown: [] };
        });

        let skipped = 0;

        costs.forEach((c, idx) => {
          const status = costStatus(c);
          if (!status.ok) {
            skipped++;
            return;
          }

          const total = c.payers.reduce((s, p) => s + safeNumber(p.amount), 0);
          const share = total / c.sharedBy.length;

          c.payers.forEach((p) => {
            if (data[p.name]) data[p.name].paid += safeNumber(p.amount);
          });

          c.sharedBy.forEach((m) => {
            if (data[m]) data[m].consumed += share;
          });

          members.forEach((m) => {
            const paidHere = c.payers
              .filter((p) => p.name === m)
              .reduce((s, p) => s + safeNumber(p.amount), 0);

            const consumedHere = c.sharedBy.includes(m) ? share : 0;

            if (paidHere > 0 || consumedHere > 0) {
              data[m].breakdown.push({
                title: (c.title || `Cost ${idx + 1}`).trim(),
                paid: paidHere,
                consumed: consumedHere
              });
            }
          });
        });

        const result = {
          skipped,
          members: members.map((m) => {
            const paid = round2(data[m].paid);
            const consumed = round2(data[m].consumed);
            const net = round2(paid - consumed);

            return {
              name: m,
              paid,
              consumed,
              net,
              breakdown: data[m].breakdown.map((b) => ({
                title: b.title,
                paid: round2(b.paid),
                consumed: round2(b.consumed),
              }))
            };
          })
        };

        setSummaryData(result);
        setActiveTab("summary");
      };

      // ---------------- Simplify ----------------
      const simplifyTransactions = () => {
        if (!members.length) {
          setSimplifyTx([{ type: "error", text: "Add members first." }]);
          setActiveTab("simplify");
          return;
        }

        let bal = {};
        members.forEach((m) => (bal[m] = 0));

        for (const c of costs) {
          const status = costStatus(c);
          if (!status.ok) continue;

          const total = c.payers.reduce((s, p) => s + safeNumber(p.amount), 0);
          c.payers.forEach((p) => {
            if (bal[p.name] !== undefined) bal[p.name] += safeNumber(p.amount);
          });

          const share = total / c.sharedBy.length;
          c.sharedBy.forEach((m) => {
            if (bal[m] !== undefined) bal[m] -= share;
          });
        }

        // build debt + cred lists
        const debt = [];
        const cred = [];

        Object.keys(bal).forEach((m) => {
          const v = round2(bal[m]);
          if (v < 0) debt.push([m, -v]);
          if (v > 0) cred.push([m, v]);
        });

        const tx = [];

        debt.forEach((d) => {
          cred.forEach((c) => {
            if (d[1] > 0 && c[1] > 0) {
              const a = Math.min(d[1], c[1]);
              d[1] = round2(d[1] - a);
              c[1] = round2(c[1] - a);

              if (a > 0) {
                tx.push({
                  from: d[0],
                  to: c[0],
                  amount: round2(a)
                });
              }
            }
          });
        });

        setSimplifyTx(tx);
        setActiveTab("simplify");
      };

      // ---------------- PDF Download ----------------
      const ensurePdfSpace = (doc, y, lineHeight = 10) => {
        const pageHeight = doc.internal.pageSize.getHeight();
        if (y + lineHeight > pageHeight - 20) {
          doc.addPage();
          return 20;
        }
        return y;
      };

      const drawSectionHeader = (doc, title, y) => {
        doc.setFillColor(15, 81, 50);
        doc.setDrawColor(15, 81, 50);
        doc.rect(15, y, 180, 12, "F");
        doc.setFont("helvetica", "bold");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(13);
        doc.text(title, 20, y + 8);
        doc.setTextColor(0, 0, 0);
        doc.setFont("helvetica", "normal");
        return y + 18;
      };

      const downloadSummaryPDF = () => {
        if (!summaryData || summaryData.error) return;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.text("QuickSplit Summary", 20, 25);
        doc.setFontSize(11);
        doc.setTextColor(100, 100, 100);
        doc.text(`Members: ${summaryData.members.length}`, 20, 34);
        doc.text(`Incomplete costs skipped: ${summaryData.skipped}`, 20, 40);
        doc.setTextColor(0, 0, 0);

        let y = 52;

        summaryData.members.forEach((member) => {
          y = ensurePdfSpace(doc, y, 40);

          doc.setFillColor(230, 242, 236);
          doc.setDrawColor(15, 81, 50);
          doc.roundedRect(15, y, 180, 40, 4, 4, "F");
          doc.setFont("helvetica", "bold");
          doc.setFontSize(12);
          doc.text(member.name, 20, y + 8);

          doc.setFont("helvetica", "normal");
          doc.setFontSize(11);
          doc.text(`Paid: ${member.paid.toFixed(2)} ${currency}`, 20, y + 16);
          doc.text(`Consumed: ${member.consumed.toFixed(2)} ${currency}`, 20, y + 24);
          doc.text(`Net: ${member.net.toFixed(2)} ${currency} ${member.net >= 0 ? "(receive)" : "(pay)"}`, 20, y + 32);
          y += 52;

          doc.setFontSize(11);
          doc.setFont("helvetica", "bold");
          doc.text("Breakdown:", 20, y - 6);
          doc.setFont("helvetica", "normal");

          if (member.breakdown.length === 0) {
            doc.setTextColor(120, 120, 120);
            doc.text("No activity for this member.", 20, y + 2);
            doc.setTextColor(0, 0, 0);
            y += 10;
          } else {
            member.breakdown.forEach((b) => {
              y = ensurePdfSpace(doc, y, 8);
              doc.text(`• ${b.title}: Paid ${b.paid.toFixed(2)} ${currency}, Consumed ${b.consumed.toFixed(2)} ${currency}`, 20, y);
              y += 8;
            });
          }

          y += 10;
        });

        doc.save("QuickSplit_Summary.pdf");
      };

      const downloadSimplifyPDF = () => {
        if (!simplifyTx.length || simplifyTx[0]?.type === "error") return;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.setTextColor(255, 255, 255);
        doc.setFillColor(15, 81, 50);
        doc.rect(15, 20, 180, 14, "F");
        doc.text("Simplified Transactions", 20, 29);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);

        let y = 40;

        simplifyTx.forEach((tx) => {
          y = ensurePdfSpace(doc, y, 10);
          doc.setFillColor(245, 247, 246);
          doc.setDrawColor(210, 214, 219);
          doc.roundedRect(15, y - 6, 180, 12, 3, 3, "F");
          doc.text(`${tx.from} to ${tx.to}`, 20, y);
          doc.text(`${tx.amount.toFixed(2)} ${currency}`, 160, y, { align: "right" });
          y += 16;
        });

        if (!simplifyTx.length) {
          doc.text("All settled. No transfers needed.", 20, y);
        }

        doc.save("QuickSplit_Transactions.pdf");
      };

      const previewSummaryPDF = () => {
        if (!summaryData || summaryData.error) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.text("QuickSplit Summary", 20, 25);
        doc.setFontSize(11);
        doc.setTextColor(100, 100, 100);
        doc.text(`Members: ${summaryData.members.length}`, 20, 34);
        doc.text(`Incomplete costs skipped: ${summaryData.skipped}`, 20, 40);
        doc.setTextColor(0, 0, 0);

        let y = 52;

        summaryData.members.forEach((member) => {
          y = ensurePdfSpace(doc, y, 40);

          doc.setFillColor(230, 242, 236);
          doc.setDrawColor(15, 81, 50);
          doc.roundedRect(15, y, 180, 40, 4, 4, "F");
          doc.setFont("helvetica", "bold");
          doc.setFontSize(12);
          doc.text(member.name, 20, y + 8);

          doc.setFont("helvetica", "normal");
          doc.setFontSize(11);
          doc.text(`Paid: ${member.paid.toFixed(2)} ${currency}`, 20, y + 16);
          doc.text(`Consumed: ${member.consumed.toFixed(2)} ${currency}`, 20, y + 24);
          doc.text(`Net: ${member.net.toFixed(2)} ${currency} ${member.net >= 0 ? "(receive)" : "(pay)"}`, 20, y + 32);
          y += 52;

          doc.setFontSize(11);
          doc.setFont("helvetica", "bold");
          doc.text("Breakdown:", 20, y - 6);
          doc.setFont("helvetica", "normal");

          if (member.breakdown.length === 0) {
            doc.setTextColor(120, 120, 120);
            doc.text("No activity for this member.", 20, y + 2);
            doc.setTextColor(0, 0, 0);
            y += 10;
          } else {
            member.breakdown.forEach((b) => {
              y = ensurePdfSpace(doc, y, 8);
              doc.text(`• ${b.title}: Paid ${b.paid.toFixed(2)} ${currency}, Consumed ${b.consumed.toFixed(2)} ${currency}`, 20, y);
              y += 8;
            });
          }

          y += 10;
        });

        window.open(doc.output("bloburl"), "_blank");
      };

      const previewSimplifyPDF = () => {
        if (!simplifyTx.length || simplifyTx[0]?.type === "error") return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.setTextColor(255, 255, 255);
        doc.setFillColor(15, 81, 50);
        doc.rect(15, 20, 180, 14, "F");
        doc.text("Simplified Transactions", 20, 29);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);

        let y = 40;

        simplifyTx.forEach((tx) => {
          y = ensurePdfSpace(doc, y, 10);
          doc.setFillColor(245, 247, 246);
          doc.setDrawColor(210, 214, 219);
          doc.roundedRect(15, y - 6, 180, 12, 3, 3, "F");
          doc.text(`${tx.from} to ${tx.to}`, 20, y);
          doc.text(`${tx.amount.toFixed(2)} ${currency}`, 160, y, { align: "right" });
          y += 16;
        });

        if (!simplifyTx.length) {
          doc.text("All settled. No transfers needed.", 20, y);
        }

        window.open(doc.output("bloburl"), "_blank");
      };

      // ---------------- UI components ----------------
      const TabButton = ({ id, children }) => (
        <button
          className={activeTab === id ? "active" : ""}
          onClick={() => setActiveTab(id)}
        >
          {children}
        </button>
      );

      const TopActions = () => (
        <div className="row" style={{ justifyContent: "space-between", alignItems: "center" }}>
          <div className="muted">
            Auto-saved ✅ (refresh safe)
          </div>
          <button className="danger small" onClick={resetApp}>
            Reset App
          </button>
        </div>
      );

      return (
        <div>
          <header>
            <h1>⚡ QuickSplit</h1>
            <p>Split bills, not friendships.</p>
            <div className="row" style={{ justifyContent: "center", gap: "10px", marginTop: "10px" }}>
              <select value={currency} onChange={(e) => setCurrency(e.target.value)}>
                <option value="BDT">Bangladeshi Taka (BDT)</option>
                <option value="USD">US Dollar (USD)</option>
                <option value="GBP">British Pound (GBP)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="SAR">Saudi Riyal (SAR)</option>
                <option value="AED">UAE Dirham (AED)</option>
                <option value="MYR">Malaysian Ringgit (MYR)</option>
                <option value="INR">Indian Rupee (INR)</option>
                <option value="CNY">Chinese Yuan (CNY)</option>
                <option value="JPY">Japanese Yen (JPY)</option>
                <option value="SGD">Singapore Dollar (SGD)</option>
                <option value="CAD">Canadian Dollar (CAD)</option>
                <option value="AUD">Australian Dollar (AUD)</option>
                <option value="KWD">Kuwaiti Dinar (KWD)</option>
                <option value="QAR">Qatari Riyal (QAR)</option>
                <option value="OMR">Omani Rial (OMR)</option>
                <option value="BHD">Bahraini Dinar (BHD)</option>
                <option value="KRW">South Korean Won (KRW)</option>
                <option value="THB">Thai Baht (THB)</option>
                <option value="CHF">Swiss Franc (CHF)</option>
              </select>
            </div>
          </header>

          <nav>
            <TabButton id="members">👥 Members</TabButton>
            <TabButton id="costs">💰 Costs</TabButton>
            <TabButton id="summary">📊 Summary</TabButton>
            <TabButton id="simplify">🔄 Simplify</TabButton>
          </nav>

          {/* MEMBERS */}
          {activeTab === "members" && (
            <div className="section">
              <TopActions />

              <h2>Add Members</h2>
              <div className="subhead">
                Add everyone in the group. You can remove people later — the app will auto-fix costs.
              </div>

              <div className="row">
                <input
                  placeholder="Member name"
                  value={memberName}
                  onChange={(e) => setMemberName(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") addMember();
                  }}
                />
                <button className="primary" onClick={addMember}>
                  Add
                </button>
              </div>

              <div className="card">
                <strong>Current Members</strong>
                <div className="muted">Tap ❌ to remove someone.</div>

                <div style={{ marginTop: 8 }}>
                  {members.length === 0 ? (
                    <div className="muted">No members yet. Add your squad 👀</div>
                  ) : (
                    members.map((m) => (
                      <span className="pill" key={m}>
                        {m}
                        <button className="x" onClick={() => removeMember(m)}>
                          ✕
                        </button>
                      </span>
                    ))
                  )}
                </div>
              </div>

              <div className="card">
                <strong>Member Balances</strong>
                <div className="muted">Net amounts based on current costs.</div>
                {computeBalances().map((m) => (
                  <div key={m.name} style={{ marginTop: 8 }}>
                    {m.name}: <span className={m.net >= 0 ? "positive" : "negative"}>{m.net.toFixed(2)} {currency}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* COSTS */}
          {activeTab === "costs" && (
            <div className="section">
              <TopActions />

              <h2>Add Costs</h2>
              <div className="subhead">
                Add each bill/expense. Choose who paid and who shared it.
              </div>

              <div className="row">
                <button className="secondary" onClick={addCost} disabled={!members.length}>
                  ➕ New Cost
                </button>

                <button className="primary" onClick={calculateSummary} disabled={!members.length}>
                  Calculate Summary
                </button>

                <button className="primary" onClick={simplifyTransactions} disabled={!members.length}>
                  Simplify Transactions
                </button>
              </div>

              {!members.length && (
                <div className="card">
                  <div className="badge warn">⚠️ Add members first</div>
                  <div className="muted">Costs need people.</div>
                </div>
              )}

              {costs.length === 0 && members.length > 0 && (
                <div className="card">
                  <div className="badge warn">No costs yet</div>
                  <div className="muted">Hit “New Cost” to start tracking expenses.</div>
                </div>
              )}

              {costs.map((c, i) => {
                const status = costStatus(c);

                return (
                  <div className="cost" key={i}>
                    <div className="row" style={{ justifyContent: "space-between", alignItems: "center" }}>
                      <strong style={{ marginBottom: 0 }}>Cost #{i + 1}</strong>

                      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                        <span className={`badge ${status.type}`}>
                          {status.type === "ok" ? "✅" : "⚠️"} {status.label}
                        </span>

                        <button className="danger small" onClick={() => removeCost(i)}>
                          Delete
                        </button>
                      </div>
                    </div>

                    <input
                      placeholder="Cost title (e.g. Dinner, Uber, Snacks)"
                      value={c.title}
                      onChange={(e) => updateCostTitle(i, e.target.value)}
                    />

                    <div className="divider"></div>

                    <div className="grid2">
                      <div>
                        <strong>Payers</strong>
                        <div className="muted">Add one or more payers.</div>

                        <div style={{ marginTop: 10 }}>
                          {c.payers.length === 0 ? (
                            <div className="muted">No payers yet.</div>
                          ) : (
                            c.payers.map((p, j) => (
                              <div className="row" key={j}>
                                <select
                                  value={p.name}
                                  onChange={(e) => updatePayerName(i, j, e.target.value)}
                                >
                                  {members.map((m) => (
                                    <option key={m} value={m}>{m}</option>
                                  ))}
                                </select>

                                <input
                                  type="number"
                                  min="0"
                                  value={p.amount}
                                  onChange={(e) => updatePayerAmount(i, j, e.target.value)}
                                />

                                <button className="danger small" onClick={() => removePayer(i, j)}>
                                  ✕
                                </button>
                              </div>
                            ))
                          )}
                        </div>

                        <button className="ghost" onClick={() => addPayer(i)}>
                          ➕ Add Payer
                        </button>
                      </div>

                      <div>
                        <strong>Shared By</strong>
                        <div className="muted">Who should split this cost?</div>

                        <div className="row" style={{ marginTop: 10 }}>
                          <button className="ghost small" onClick={() => shareAll(i)}>
                            Select All
                          </button>
                          <button className="ghost small" onClick={() => shareNone(i)}>
                            Clear All
                          </button>
                        </div>

                        <div style={{ marginTop: 6 }}>
                          {members.map((m) => (
                            <div key={m} style={{ marginBottom: 6 }}>
                              <label>
                                <input
                                  type="checkbox"
                                  checked={c.sharedBy.includes(m)}
                                  onChange={(e) => toggleShare(i, m, e.target.checked)}
                                />{" "}
                                {m}
                              </label>
                            </div>
                          ))}
                        </div>

                        <div className="muted">
                          Selected: <strong>{c.sharedBy.length}</strong> member(s)
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* SUMMARY */}
          {activeTab === "summary" && (
            <div className="section">
              <TopActions />

              <h2>Summary</h2>
              <div className="subhead">
                Who paid, who consumed, and who should receive/pay.
              </div>

              <div className="row">
                <button className="primary" onClick={calculateSummary}>
                  Calculate
                </button>
                <button className="secondary" onClick={() => setActiveTab("costs")}>
                  Edit Costs
                </button>
                {summaryData && !summaryData.error && (
                  <>
                    <button className="primary" onClick={previewSummaryPDF}>
                      👁️ Preview Summary PDF
                    </button>
                    <button className="primary" onClick={downloadSummaryPDF}>
                      📄 Download Summary PDF
                    </button>
                  </>
                )}
              </div>

              {!summaryData && (
                <div className="card">
                  <div className="badge warn">No summary yet</div>
                  <div className="muted">Press “Calculate” to generate results.</div>
                </div>
              )}

              {summaryData?.error && (
                <div className="card">
                  <div className="badge warn">⚠️ {summaryData.error}</div>
                </div>
              )}

              {summaryData && !summaryData.error && (
                <div>
                  {summaryData.skipped > 0 && (
                    <div className="summary-line negative">
                      ⚠️ {summaryData.skipped} incomplete cost(s) ignored
                    </div>
                  )}

                  {summaryData.members.map((m) => (
                    <div className="cost" key={m.name}>
                      <strong>{m.name}</strong>

                      <div style={{ marginTop: 8 }}>
                        <div>Total Paid: <span className="positive">{m.paid.toFixed(2)} {currency}</span></div>
                        <div>Total Consumed: <span className="negative">{m.consumed.toFixed(2)} {currency}</span></div>

                        <div style={{ marginTop: 4 }}>
                          Net:{" "}
                          <span className={m.net >= 0 ? "positive" : "negative"}>
                            {m.net.toFixed(2)} {currency} {m.net >= 0 ? "(will receive)" : "(needs to pay)"}
                          </span>
                        </div>
                      </div>

                      <div className="divider"></div>

                      {m.breakdown.length === 0 ? (
                        <div className="muted">No activity yet.</div>
                      ) : (
                        m.breakdown.map((b, idx) => (
                          <div key={idx} style={{ fontSize: 14, marginBottom: 6 }}>
                            • <strong>{b.title}</strong> — Paid: {b.paid.toFixed(2)} {currency}, Consumed: {b.consumed.toFixed(2)} {currency}
                          </div>
                        ))
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* SIMPLIFY */}
          {activeTab === "simplify" && (
            <div className="section">
              <TopActions />

              <h2>Simplified Transactions</h2>
              <div className="subhead">
                Minimal transfers to settle everything cleanly.
              </div>

              <div className="row">
                <button className="primary" onClick={simplifyTransactions}>
                  Simplify
                </button>
                <button className="secondary" onClick={() => setActiveTab("costs")}>
                  Edit Costs
                </button>
                {simplifyTx.length > 0 && !simplifyTx[0]?.type && (
                  <>
                    <button className="primary" onClick={previewSimplifyPDF}>
                      👁️ Preview Transactions PDF
                    </button>
                    <button className="primary" onClick={downloadSimplifyPDF}>
                      📄 Download Transactions PDF
                    </button>
                  </>
                )}
              </div>

              {simplifyTx.length === 0 ? (
                <div className="card">
                  <div className="badge warn">No transactions yet</div>
                  <div className="muted">Press “Simplify” to generate transactions.</div>
                </div>
              ) : simplifyTx[0]?.type === "error" ? (
                <div className="card">
                  <div className="badge warn">⚠️ {simplifyTx[0].text}</div>
                </div>
              ) : (
                <div className="card">
                  <strong>Transfers</strong>
                  <div className="muted">Pay these and you’re fully settled 🎉</div>

                  <div style={{ marginTop: 10 }}>
                    {simplifyTx.length === 0 ? (
                      <div className="summary-line positive">All settled 🎉</div>
                    ) : (
                      simplifyTx.map((t, idx) => (
                        <div className="summary-line" key={idx}>
                          {t.from} → {t.to} : <strong>{t.amount.toFixed(2)} {currency}</strong>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              )}
            </div>
          )}

          <footer>
            QuickSplit — © <a href="https://jawadur.pro.bd">Jawadur Rafid</a>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
